<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yao Flame Lab — 火焰的形成从不只是一种元素</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="bg">
    <div class="bg-stripe bg-stripe-1"></div>
    <div class="bg-stripe bg-stripe-2"></div>
    <div class="bg-stripe bg-stripe-3"></div>
    <div class="bg-stripe bg-stripe-4"></div>
  </div>

  <header class="topbar">
    <div class="brand">Yao Flame Lab<span class="dot">.</span></div>
    <nav class="nav">
      <a href="#about">关于</a>
      <a href="#work">作品</a>
      <a href="#contact">联络</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-text">
        <h1>YAO <em>FLAME</em> LAB</h1>
        <p class="sub">火焰的形成从不只是一种元素</p>
      </div>

      <canvas id="stage"></canvas>

      <div class="categories" aria-hidden="true">
        <button class="cat" data-cat="economy">
          <span class="cat-num">01</span>
          <span class="cat-name">经济</span>
        </button>
        <button class="cat" data-cat="emotion">
          <span class="cat-num">02</span>
          <span class="cat-name">情感</span>
        </button>
        <button class="cat" data-cat="welfare">
          <span class="cat-num">03</span>
          <span class="cat-name">公益</span>
        </button>
        <button class="cat" data-cat="creative">
          <span class="cat-num">04</span>
          <span class="cat-name">创意</span>
        </button>
      </div>
    </section>

    <section class="scroll-spacer"></section>

    <section id="work" class="work">
      <div class="work-inner">
        <p class="work-eyebrow">作品集 · WORK</p>
        <h2>四种燃烧，四种语言。</h2>
        <p class="work-lede">
          每一团火都从不同的元素生长——从市场的逻辑、情绪的微光、人群的回响，到创造的偶然。
          点击上方四个触点，进入对应的作品类别。
        </p>
      </div>
    </section>
  </main>

  <div class="cursor" id="cursor"></div>

  <!-- Three.js via CDN, browser-only -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
